<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1800" width="1200" height="1800">
  <defs>
    <!-- Background radial gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0c4a6e"/>
      <stop offset="100%" stop-color="#082f49"/>
    </radialGradient>
    
    <!-- Logo gradient -->
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    
    <!-- Progress bar gradient -->
    <linearGradient id="progressGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#7dd3fc"/>
    </linearGradient>
    
    <!-- Glow filters -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    
    <!-- Card shadow -->
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="32" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    
    <!-- Logo glow -->
    <filter id="logoGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="1800" fill="url(#bgGrad)"/>
  
  <!-- Subtle background glows -->
  <circle cx="150" cy="250" r="300" fill="#0ea5e9" opacity="0.08" filter="url(#glow)"/>
  <circle cx="1050" cy="1500" r="300" fill="#38bdf8" opacity="0.06" filter="url(#glow)"/>
  
  <!-- Glass Card -->
  <rect x="120" y="380" width="960" height="980" rx="72" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="2" filter="url(#cardShadow)"/>
  
  <!-- Logo Section -->
  <rect x="480" y="440" width="240" height="240" rx="64" fill="url(#logoGrad)" filter="url(#logoGlow)"/>
  <rect x="480" y="440" width="240" height="240" rx="64" fill="url(#logoGrad)"/>
  
  <!-- Money/Ledger icon inside logo -->
  <path d="M600 490 v100" stroke="white" stroke-width="12" stroke-linecap="round"/>
  <path d="M640 520 h-60 a18 18 0 0 0 0 36 h36 a18 18 0 0 1 0 36 h-44" stroke="white" stroke-width="9" stroke-linecap="round" fill="none"/>
  
  <!-- Title -->
  <text x="600" y="780" font-family="system-ui, -apple-system, sans-serif" font-size="96" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-2">
    DIGITAL <tspan fill="#7dd3fc">LEDGER</tspan>
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="850" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="300" fill="rgba(186,230,253,0.4)" text-anchor="middle" letter-spacing="12" text-transform="uppercase">
    BEYOND THE BOOKS
  </text>
  
  <!-- Progress Bar Track -->
  <rect x="220" y="1050" width="760" height="8" rx="4" fill="rgba(255,255,255,0.06)"/>
  
  <!-- Progress Bar Fill (at ~80%) -->
  <rect x="220" y="1050" width="608" height="8" rx="4" fill="url(#progressGrad)" filter="url(#glow)"/>
  
  <!-- Status Row -->
  <text x="220" y="1130" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="rgba(56,189,248,0.5)" letter-spacing="6" text-transform="uppercase">
    CALCULATING NET WORTH...
  </text>
  <text x="980" y="1130" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="rgba(56,189,248,0.5)" text-anchor="end">
    80%
  </text>
  
  <!-- Footer -->
  <text x="600" y="1500" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="rgba(224,242,254,0.12)" text-anchor="middle" letter-spacing="4" text-transform="uppercase">
    DEVELOPED BY AHMED SUNIL
  </text>
</svg>
