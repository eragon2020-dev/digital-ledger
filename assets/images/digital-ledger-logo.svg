<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0EA5E9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0284C7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0F2FE;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)"/>
  
  <!-- Book/Ledger Icon -->
  <g transform="translate(256, 220)">
    <!-- Book body -->
    <path d="M-80,-60 L0,-40 L80,-60 L80,60 L0,80 L-80,60 Z" fill="url(#bookGrad)" opacity="0.95"/>
    
    <!-- Book spine -->
    <line x1="0" y1="-40" x2="0" y2="80" stroke="#0EA5E9" stroke-width="3" opacity="0.6"/>
    
    <!-- Ledger lines on left page -->
    <line x1="-65" y1="-30" x2="-15" y2="-20" stroke="#0EA5E9" stroke-width="2" opacity="0.5"/>
    <line x1="-65" y1="-10" x2="-15" y2="0" stroke="#0EA5E9" stroke-width="2" opacity="0.5"/>
    <line x1="-65" y1="10" x2="-15" y2="20" stroke="#0EA5E9" stroke-width="2" opacity="0.5"/>
    <line x1="-65" y1="30" x2="-15" y2="40" stroke="#0EA5E9" stroke-width="2" opacity="0.5"/>
    
    <!-- Ledger lines on right page -->
    <line x1="15" y1="-20" x2="65" y2="-30" stroke="#0EA5E9" stroke-width="2" opacity="0.5"/>
    <line x1="15" y1="0" x2="65" y2="-10" stroke="#0EA5E9" stroke-width="2" opacity="0.5"/>
    <line x1="15" y1="20" x2="65" y2="10" stroke="#0EA5E9" stroke-width="2" opacity="0.5"/>
    <line x1="15" y1="40" x2="65" y2="30" stroke="#0EA5E9" stroke-width="2" opacity="0.5"/>
    
    <!-- Digital elements - dots representing digital data -->
    <circle cx="-40" cy="-25" r="3" fill="#0EA5E9"/>
    <circle cx="-40" cy="-5" r="3" fill="#0EA5E9"/>
    <circle cx="-40" cy="15" r="3" fill="#0EA5E9"/>
    <circle cx="40" cy="-25" r="3" fill="#0EA5E9"/>
    <circle cx="40" cy="-5" r="3" fill="#0EA5E9"/>
    <circle cx="40" cy="15" r="3" fill="#0EA5E9"/>
  </g>
  
  <!-- DL initials at bottom -->
  <g transform="translate(256, 400)" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="72" fill="white">
    <text>DL</text>
  </g>
</svg>
